spring.application.name=SprintSight

spring.profiles.active=${ACTIVE_PROFILES:dev}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

SprintSight.app.jwtSecret=${JWT_SECRET}
SprintSight.app.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}
SprintSight.app.refreshExpirationDays=${REFRESH_EXPIRATION_DAYS:7}

sprintsight.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

sprintsight.refresh-token.cleanup-cron=${REFRESH_TOKEN_CLEANUP_CRON:0 0 3 * * *}

spring.jackson.time-zone=UTC

spring.threads.virtual.enabled=true

server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n
